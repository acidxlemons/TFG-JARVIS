# ============================================
# config/nginx/nginx.conf
# NGINX REVERSE PROXY
# Sistema RAG Empresarial (mejorado)
# ============================================

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 100M;  # Importante para uploads
    client_body_buffer_size 16M;
    large_client_header_buffers 8 16k;

    # Compresión
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=upload_limit:10m rate=2r/s;

    # Soporte Upgrade limpio para WebSocket
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # Upstreams con keepalive
    upstream openwebui {
        server openwebui:8080;
        keepalive 64;
    }

    upstream backend {
        server rag-backend:8000;
        keepalive 64;
    }

    upstream indexer {
        server indexer:8001;
        keepalive 16;
    }

    upstream qdrant {
        server qdrant:6333;
        keepalive 16;
    }

    # ============================================
    # HTTP Server (redirect to HTTPS)
    # ============================================
    server {
        listen 80;
        server_name _;

        # Permitir validación de Let's Encrypt
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Redirigir todo a HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ============================================
    # HTTPS Server
    # ============================================
    server {
        listen 443 ssl http2;
        server_name _;  # Reemplazar con tu dominio

        # Certificados SSL
        ssl_certificate /etc/nginx/ssl/cert.pem;
        ssl_certificate_key /etc/nginx/ssl/key.pem;

        # Configuración SSL moderna
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;

        # Security headers
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        # Nota: CSP se puede añadir, pero puede romper OpenWebUI si es muy estricta.

        # ==================== OPENWEBUI ====================
        location / {
            proxy_pass http://openwebui;
            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSocket
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;

            # Timeouts mayores por streaming UI
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 300s;

            # Importante para SSE/stream de modelos
            proxy_buffering off;
            # Evitar compresión aguas arriba que puede interferir con SSE
            proxy_set_header Accept-Encoding "";
        }

        # ==================== UPLOADS (más específico) ====================
        # Lo dejamos ANTES o DESPUÉS de /api/ es indiferente: NGINX prioriza el match más específico.
        location = /api/documents/upload {
            allow 127.0.0.1;
            allow ::1;
            deny all;
            limit_req zone=upload_limit burst=5 nodelay;

            proxy_pass http://backend/documents/upload;
            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_connect_timeout 120s;
            proxy_send_timeout 600s;
            proxy_read_timeout 600s;

            client_max_body_size 500M;

            # Protección ante errores temporales
            proxy_next_upstream error timeout http_500 http_502 http_503 http_504;
        }

        # ==================== BACKEND API ====================
        # ==================== BACKEND API (Renamed to prevent conflict) ====================
        location /rag-api/ {
            allow 127.0.0.1;
            allow ::1;
            deny all;
            limit_req zone=api_limit burst=20 nodelay;

            # Rewrite /rag-api/foo -> /foo
            rewrite ^/rag-api/(.*) /$1 break;

            proxy_pass http://backend;
            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_connect_timeout 60s;
            proxy_send_timeout 300s;
            proxy_read_timeout 600s;
        }

        # ==================== WEBHOOKS ====================
        location /webhooks/ {
            proxy_pass http://indexer/webhooks/;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Sin rate limit para webhooks externos
            proxy_read_timeout 120s;
        }

        # ==================== QDRANT (OPCIONAL) ====================
        # location /qdrant/ {
        #     auth_basic "Restricted";
        #     auth_basic_user_file /etc/nginx/.htpasswd;
        #     proxy_pass http://qdrant/;
        #     proxy_set_header Host $host;
        # }

        # ==================== HEALTH CHECKS ====================
        location = /health {
            access_log off;
            proxy_pass http://backend/health;
        }

        # ==================== STATIC FILES ====================
        # Force no-cache for custom.css to ensure theme updates apply immediately
        location ~* /custom.css$ {
            proxy_pass http://openwebui;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Kill cache
            add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
            expires off;
        }

        # STATIC FILES - Commented out to prevent shadowing OpenWebUI internal static assets
        # location /static/ {
        #     alias /var/www/static/;
        #     expires 30d;
        #     add_header Cache-Control "public, immutable";
        # }
    }
}
