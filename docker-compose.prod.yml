version: '3.8'

# ==========================================
# 🚀 JARVIS RAG SYSTEM - PRODUCTION DEPLOY
# ==========================================
# Usa imágenes pre-compiladas desde Docker Hub.
# Ideal para despliegue rápido sin build local.

services:

  # ------------------------------------------
  # 1. Frontend & UI
  # ------------------------------------------
  openwebui:
    image: acidxlemons/jarvis-openwebui:latest
    container_name: openwebui
    volumes:
      - openwebui_data:/app/backend/data
    environment:
      # Conexión interna
      - OLLAMA_BASE_URL=http://litellm:4000
      - WEBUI_SECRET_KEY=${JWT_SECRET:-changeme}
      # Integración JARVIS
      - ENABLE_RAG_WEB_SEARCH=True
      - RAG_WEB_SEARCH_ENGINE=duckduckgo
      - BACKEND_URL=http://rag-backend:8000
    depends_on:
      - rag-backend
      - litellm
    restart: always

  # ------------------------------------------
  # 2. RAG Backend Agent
  # ------------------------------------------
  rag-backend:
    image: acidxlemons/jarvis-backend:latest
    container_name: rag-backend
    volumes:
      - ./data:/app/data
      - ./config:/app/config
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-rag_user}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-rag_system}
      - QDRANT_URL=http://qdrant:6333
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - qdrant
      - postgres
      - redis
    restart: always

  # ------------------------------------------
  # 3. Indexer Worker
  # ------------------------------------------
  indexer:
    image: acidxlemons/jarvis-indexer:latest
    container_name: rag-indexer
    volumes:
      - ./data:/app/data
      - ./config:/app/config
    environment:
      - WATCH_DIR=/app/data/watch
      - QDRANT_URL=http://qdrant:6333
    depends_on:
      - qdrant
      - rag-backend
    restart: always

  # ------------------------------------------
  # 4. MCP Server BOE
  # ------------------------------------------
  mcp-boe:
    image: acidxlemons/jarvis-mcp-boe:latest
    container_name: rag-mcp-boe
    ports:
      - "8010:8010"
    restart: always

  # ------------------------------------------
  # 5. Core Services (Official Images)
  # ------------------------------------------
  qdrant:
    image: qdrant/qdrant:v1.7.4
    container_name: rag-qdrant
    volumes:
      - qdrant_data:/qdrant/storage
    ports:
      - "6333:6333"
    restart: always

  postgres:
    image: postgres:15-alpine
    container_name: rag-postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-rag_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-changeme}
      - POSTGRES_DB=${POSTGRES_DB:-rag_system}
    restart: always

  redis:
    image: redis:7-alpine
    container_name: rag-redis
    volumes:
      - redis_data:/data
    restart: always

  # ------------------------------------------
  # 6. LLM Services
  # ------------------------------------------
  ollama:
    image: ollama/ollama:latest
    container_name: rag-ollama
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [ gpu ]
    restart: always

  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    container_name: rag-litellm
    volumes:
      - ./services/litellm/config.yaml:/app/config.yaml
    command: [ "--config", "/app/config.yaml", "--port", "4000" ]
    depends_on:
      - ollama
    restart: always

  # ------------------------------------------
  # 7. Reverse Proxy
  # ------------------------------------------
  nginx:
    image: nginx:alpine
    container_name: rag-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./config/nginx:/etc/nginx/conf.d
      - ./config/nginx/ssl:/etc/nginx/ssl
    depends_on:
      - openwebui
      - grafana
    restart: always

  # ------------------------------------------
  # 8. Monitoring (Optional)
  # ------------------------------------------
  prometheus:
    image: prom/prometheus:latest
    container_name: rag-prometheus
    volumes:
      - ./config/prometheus:/etc/prometheus
    restart: always

  grafana:
    image: grafana/grafana:latest
    container_name: rag-grafana
    volumes:
      - grafana_data:/var/lib/grafana
      - ./config/grafana/provisioning:/etc/grafana/provisioning
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
    depends_on:
      - prometheus
    restart: always

  searxng:
    image: searxng/searxng:latest
    container_name: rag-searxng
    volumes:
      - ./config/searxng:/etc/searxng
    environment:
      - SEARXNG_BASE_URL=http://localhost:8888/
    restart: always

volumes:
  qdrant_data:
  postgres_data:
  redis_data:
  ollama_data:
  openwebui_data:
  grafana_data:
  minio_data:
  crawlee_storage:
