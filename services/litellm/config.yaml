model_list:
  # Modelo principal para chat y RAG - FINE-TUNED (JARVIS)
  - model_name: JARVIS
    litellm_params:
      model: ollama/rag-qwen-ft:latest
      api_base: http://ollama:11434
      temperature: 0.1
      max_tokens: 4096
      top_p: 0.9
      stream: true
    model_info:
      mode: chat
      supports_function_calling: false
      supports_vision: false
      context_window: 8192

  # Qwen 2.5 32B Q4_K_M (modelo principal para texto, RAG, chat)
  - model_name: qwen2.5-32b
    litellm_params:
      model: ollama/qwen2.5:32b-instruct-q4_K_M
      api_base: http://ollama:11434
      temperature: 0.7
      max_tokens: 8192
      stream: true
    model_info:
      mode: chat
      supports_vision: false
      context_window: 32768

  # Qwen 2.5 VL (Vision Language) - OCR y análisis de imágenes
  - model_name: qwen2.5vl
    litellm_params:
      model: ollama/qwen2.5vl:7b
      api_base: http://ollama:11434
      temperature: 0.3
      max_tokens: 4096
      stream: true
    model_info:
      mode: chat
      supports_vision: true

litellm_settings:
  set_verbose: false
  json_logs: true
  redact_headers: true
  redact_request_body: true
  redact_response_body: false

  rpm: 100
  tpm: 50000
  per_user_rpm: 60
  per_user_tpm: 30000

  request_timeout: 180
  num_retries: 1
  retry_backoff: exponential
  retry_backoff_factor: 2
  retry_on_status_codes: [408, 429, 500, 502, 503, 504]

  cache: true
  cache_params:
    type: redis
    host: redis
    port: 6379
    namespace: "litellm"

  enable_cors: true
  # Restringe CORS a la URL de la app (APP_URL) y localhost para desarrollo
  allowed_origins:
    - os.environ/APP_URL
    - "http://localhost"
    - "http://localhost:3000"
    - "https://localhost"

  # Claves leídas desde variables de entorno (nunca hardcodeadas)
  proxy_api_keys:
    - os.environ/LITELLM_MASTER_KEY

router_settings:
  routing_strategy: simple-shuffle
  model_group_alias:
    gpt-3.5-turbo: JARVIS
    gpt-4: JARVIS
    gpt-4o: JARVIS
    gpt-4o-mini: JARVIS
    llama3.1-8b: qwen2.5-32b
    llama3.1-summarize: qwen2.5-32b

  fallbacks:
    - JARVIS: [qwen2.5-32b]
    - qwen2.5-32b: [JARVIS]
    - llama3.1-8b: [JARVIS]

  health_check_interval: 10
  health_check_timeout: 3
  circuit_breaker:
    failure_threshold: 5
    recovery_time_seconds: 30
    half_open_success_threshold: 2

general_settings:
  database:
    enabled: false          # ⬅️ desactivamos DB totalmente
  store_model_in_db: false  # ⬅️ que no intente guardar modelos en DB

  master_key: os.environ/LITELLM_MASTER_KEY  # Leído del .env, nunca hardcodeado

  max_request_body_size: 5000000
  max_response_body_size: 10000000


spend_logs:
  enabled: false          # <- Nada de logs en DB

environment_variables:
  PORT: "4000"
  PROMETHEUS_PORT: "4001"
  ENABLE_HEALTH_SERVER: "true"
  HEALTHCHECK_PATH: "/health"
